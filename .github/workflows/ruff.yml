name: ruff
permissions:
  contents: read
on:
  push:
    branches:
      - develop
    pull_request:
      - develop
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: astral-sh/ruff-action@4919ec5cf1f49eff0871dbcea0da843445b837e6
        with:
          args: --check
          src: >-
            cogs/misc.py
            cogs/quotes.py
            cogs/status.py
            bot.py
            config.py
            database.py