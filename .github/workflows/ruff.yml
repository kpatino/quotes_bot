name: ruff
permissions:
  contents: read
on:
  push:
    branches:
      - develop
    pull_request:
      - develop
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b
        with:
          src: >-
            cogs/misc.py
            cogs/quotes.py
            cogs/status.py
            bot.py
            config.py
            database.py